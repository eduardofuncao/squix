name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  APP_NAME: squix
  GO_VERSION: '1.25'

jobs:
  build-darwin:
    strategy:
      matrix:
        include:
          - goarch: amd64
            runner: macos-15-large
          - goarch: arm64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          CGO_ENABLED: 1
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -buildvcs=false -ldflags="-s -w" -o dist/${{ env.APP_NAME }}-darwin-${{ matrix.goarch }} ./cmd/squix

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-${{ matrix.goarch }}
          path: dist/${{ env.APP_NAME }}-darwin-${{ matrix.goarch }}

  build-cross:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            packages: ""
          - goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
            packages: "gcc-aarch64-linux-gnu g++-aarch64-linux-gnu"
          - goos: windows
            goarch: amd64
            ext: .exe
            cgo: "0"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install cross-compiler
        if: matrix.packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}

      - name: Build
        env:
          CGO_ENABLED: ${{ matrix.cgo || '1' }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: |
          mkdir -p dist
          go build -buildvcs=false -ldflags="-s -w" -o dist/${{ env.APP_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/squix

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/${{ env.APP_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  create-release:
    needs:
      - build-darwin
      - build-cross
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name '${{ env.APP_NAME }}-*' -o -name '${{ env.APP_NAME }}-*.exe' \) -exec cp {} release/ \)
          cd release && sha256sum * > checksums.txt

      - uses: softprops/action-gh-release@v1
        with:
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
